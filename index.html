<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BN Tiffin Management</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-top: 20px; }
        .tiffin-card { border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header-section { background: linear-gradient(135deg, #198754, #146c43); color: white; padding: 25px; }
        .summary-box { background: #fff; border-left: 5px solid #198754; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .loader-container { display: flex; justify-content: center; align-items: center; min-height: 200px; }
        .table thead { background-color: #343a40; color: white; }
        .badge-custom { font-size: 0.9rem; padding: 0.5em 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <div class="card tiffin-card">
        <!-- Header -->
        <div class="header-section text-center">
            <h2 class="fw-bold mb-1">BN Tiffin Management</h2>
            <h5 id="month-text" class="opacity-75">Loading Month...</h5>
        </div>

        <div class="card-body p-4">
            <!-- Summary Section -->
            <div class="row g-3 text-center mb-4">
                <div class="col-6">
                    <div class="summary-box">
                        <small class="text-muted d-block text-uppercase">Total Amount</small>
                        <strong class="fs-4 text-success" id="total-amt">৳ 0</strong>
                    </div>
                </div>
                <div class="col-6">
                    <div class="summary-box" style="border-left-color: #dc3545;">
                        <small class="text-muted d-block text-uppercase">Total Expense</small>
                        <strong class="fs-4 text-danger" id="total-exp">৳ 0</strong>
                    </div>
                </div>
            </div>

            <!-- Loader -->
            <div id="loader" class="loader-container">
                <div class="spinner-border text-success" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>

            <!-- Data Table -->
            <div id="main-content" style="display: none;">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Taka</th>
                                <th>Meal</th>
                                <th>Hand Cash</th>
                            </tr>
                        </thead>
                        <tbody id="member-list">
                            <!-- Data injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // আপনার দেওয়া গুগল অ্যাপস স্ক্রিপ্ট URL
    const webAppUrl = "https://script.google.com/macros/s/AKfycbxQm2AC-QXYCwVHyBqC4W7w5El_3JToAXxfvzNYSAiPZJFOrWy1qIIQ-35Wu22hHddaoQ/exec";

    async function fetchData() {
        try {
            const response = await fetch(webAppUrl);
            const data = await response.json();
            
            // UI Update: Summary
            document.getElementById('month-text').innerText = "Month: " + (data.summary.month || "N/A");
            document.getElementById('total-amt').innerText = "৳ " + (data.summary.totalAmount || 0);
            document.getElementById('total-exp').innerText = "৳ " + (data.summary.totalExpense || 0);

            // UI Update: Member List
            const listBody = document.getElementById('member-list');
            listBody.innerHTML = ''; // Clear previous data

            data.members.forEach(member => {
                const row = `
                    <tr>
                        <td class="fw-bold text-dark">${member.name}</td>
                        <td><span class="badge bg-primary badge-custom">৳ ${member.taka}</span></td>
                        <td><span class="badge bg-info text-dark badge-custom">${member.meal} Meals</span></td>
                        <td class="fw-bold text-success">৳ ${member.handcash}</td>
                    </tr>
                `;
                listBody.innerHTML += row;
            });

            // Hide loader, show content
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

        } catch (error) {
            console.error("Error fetching data:", error);
            document.getElementById('loader').innerHTML = `<p class="text-danger">Failed to load data. Please check connection.</p>`;
        }
    }

    // অ্যাপ লোড হওয়ার সাথে সাথে ফাংশনটি চলবে
    window.onload = fetchData;
</script>

<!-- Bootstrap Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
