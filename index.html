<!DOCTYPE html>
<html>
<head>
    <title>BN Tiffin Test</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f2f5; }
        .card { background: white; border-radius: 10px; padding: 20px; margin: 10px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #1b5e20; color: white; }
        button { background: #ffd700; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>

<div>
    <h1>🍽️ BN Tiffin Management</h1>
    
    <!-- YOUR APPS SCRIPT URL - PUT HERE -->
    <input type="text" id="urlInput" style="width: 100%; margin-bottom: 10px;" 
           placeholder="Paste your Apps Script URL here">
    <button onclick="setUrlAndLoad()">Set URL & Load Data</button>
    
    <div id="status" style="margin: 10px 0;"></div>
    
    <div id="content" style="display: none;">
        <!-- Dashboard -->
        <div class="card">
            <h2>📊 Financial Summary</h2>
            <p><strong>Total Amount:</strong> ৳ <span id="totalAmount">0</span></p>
            <p><strong>Total Expense:</strong> ৳ <span id="totalExpense">0</span></p>
            <p><strong>Month:</strong> <span id="month">-</span></p>
            <div style="background: #fff3cd; padding: 10px; border-radius: 5px;">
                <strong>📝 Note:</strong> <span id="note">-</span>
            </div>
        </div>
        
        <!-- Stats -->
        <div class="card">
            <h2>📈 Statistics</h2>
            <p><strong>Total Members:</strong> <span id="totalMembers">0</span></p>
            <p><strong>Average / Person:</strong> ৳ <span id="avgAmount">0</span></p>
        </div>
        
        <!-- Members Table -->
        <div class="card">
            <h2>👥 Members Monthly Deposit</h2>
            <table id="membersTable">
                <thead><tr><th>#</th><th>Name</th><th>Taka</th></thead>
                <tbody></tbody>
            </table>
        </div>
        
        <!-- Admin Panel (shows only after login) -->
        <div class="card" id="adminPanel" style="display: none; border: 2px solid #ffc107;">
            <h2>🔧 Admin Control Panel</h2>
            
            <div>
                <h3>Update Total Expense</h3>
                <input type="number" id="expenseInput" placeholder="Enter expense amount">
                <button onclick="updateExpense()">Update Expense</button>
            </div>
            
            <div style="margin-top: 15px;">
                <h3>Update Note</h3>
                <textarea id="noteInput" rows="2" placeholder="Enter note..."></textarea>
                <button onclick="updateNote()">Update Note</button>
            </div>
            
            <div style="margin-top: 15px;">
                <h3>Update Member Deposit</h3>
                <div id="memberEditList"></div>
            </div>
        </div>
    </div>
    
    <div id="loginSection" class="card" style="text-align: center;">
        <button onclick="showLogin()" style="background: #1b5e20; color: white;">🔐 Admin Login</button>
    </div>
</div>

<!-- Login Modal -->
<div id="loginModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center;">
    <div style="background: white; padding: 30px; border-radius: 10px; width: 300px;">
        <h3>Admin Login</h3>
        <input type="text" id="loginUser" placeholder="Username" style="width: 100%; margin: 10px 0;">
        <input type="password" id="loginPass" placeholder="Password" style="width: 100%; margin: 10px 0;">
        <div id="loginMsg" class="error"></div>
        <button onclick="doLogin()" style="width: 100%;">Login</button>
        <button onclick="closeLogin()" style="width: 100%; margin-top: 5px;">Cancel</button>
    </div>
</div>

<script>
let APP_URL = "https://script.google.com/macros/s/AKfycbxNJJ-2wuLCMUXcqcRjDM6vMq5385wQ5rsseOUjgU-3mHI22cq8xU2siUXQ2B2iR5flag/exec";
let membersData = [];
let isAdmin = false;
let summaryData = {};

function setUrlAndLoad() {
    APP_URL = document.getElementById('urlInput').value.trim();
    if (APP_URL) {
        localStorage.setItem('appUrl', APP_URL);
        loadData();
    } else {
        alert('Please paste your Apps Script URL');
    }
}

// Check for saved URL
const savedUrl = localStorage.getItem('appUrl');
if (savedUrl) {
    document.getElementById('urlInput').value = savedUrl;
    APP_URL = savedUrl;
    loadData();
}

async function loadData() {
    if (!APP_URL) return;
    
    document.getElementById('status').innerHTML = '<span class="success">Loading data...</span>';
    
    try {
        const response = await fetch(`${APP_URL}?t=${Date.now()}`, {
            method: 'GET',
            cache: 'no-store'
        });
        
        const data = await response.json();
        
        if (!data.success) {
            throw new Error(data.error || 'Failed to load');
        }
        
        membersData = data.members || [];
        summaryData = data;
        
        // Update dashboard
        const totalAmount = membersData.reduce((sum, m) => sum + (Number(m.taka) || 0), 0);
        const totalMembers = membersData.length;
        const avgAmount = totalMembers > 0 ? totalAmount / totalMembers : 0;
        
        document.getElementById('totalAmount').innerText = totalAmount.toFixed(2);
        document.getElementById('totalExpense').innerText = (data.totalExpense || 0).toFixed(2);
        document.getElementById('month').innerText = data.month || 'January';
        document.getElementById('note').innerText = data.note || 'No notes';
        document.getElementById('totalMembers').innerText = totalMembers;
        document.getElementById('avgAmount').innerText = avgAmount.toFixed(2);
        
        // Render members table
        const tbody = document.querySelector('#membersTable tbody');
        tbody.innerHTML = '';
        membersData.forEach((member, idx) => {
            tbody.innerHTML += `<tr><td>${idx+1}</td><td>${member.name}</td><td>৳ ${Number(member.taka).toFixed(2)}</td></tr>`;
        });
        
        document.getElementById('content').style.display = 'block';
        document.getElementById('status').innerHTML = '<span class="success">✅ Data loaded successfully!</span>';
        
    } catch(error) {
        console.error(error);
        document.getElementById('status').innerHTML = `<span class="error">❌ Error: ${error.message}<br>Check: 1. URL correct? 2. Apps Script deployed with "Anyone" access?</span>`;
        document.getElementById('content').style.display = 'none';
    }
}

function showLogin() {
    document.getElementById('loginModal').style.display = 'flex';
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
    document.getElementById('loginMsg').innerHTML = '';
}

function closeLogin() {
    document.getElementById('loginModal').style.display = 'none';
}

function doLogin() {
    const user = document.getElementById('loginUser').value;
    const pass = document.getElementById('loginPass').value;
    
    if (user === 'admin' && pass === 'admin123') {
        isAdmin = true;
        closeLogin();
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('loginSection').style.display = 'none';
        
        // Load admin edit list
        loadMemberEditList();
        document.getElementById('expenseInput').value = summaryData.totalExpense || '';
        document.getElementById('noteInput').value = summaryData.note || '';
        
        alert('✅ Admin login successful!');
    } else {
        document.getElementById('loginMsg').innerHTML = '❌ Invalid username or password!';
    }
}

function loadMemberEditList() {
    const container = document.getElementById('memberEditList');
    container.innerHTML = '';
    
    membersData.forEach((member, idx) => {
        const div = document.createElement('div');
        div.style.margin = '10px 0';
        div.style.padding = '10px';
        div.style.border = '1px solid #ddd';
        div.style.borderRadius = '5px';
        div.innerHTML = `
            <strong>${member.name}</strong><br>
            Current: ৳ ${Number(member.taka).toFixed(2)}<br>
            <input type="number" id="editTaka_${idx}" value="${member.taka}" style="width: 150px; display: inline-block;">
            <button onclick="updateMemberTaka(${idx})">Update</button>
        `;
        container.appendChild(div);
    });
}

async function updateMemberTaka(index) {
    if (!isAdmin) return;
    
    const newTaka = parseFloat(document.getElementById(`editTaka_${index}`).value) || 0;
    
    try {
        await fetch(APP_URL, {
            method: 'POST',
            body: JSON.stringify({ type: 'updateMember', index: index, taka: newTaka })
        });
        alert('✅ Member deposit updated!');
        loadData();
    } catch(e) {
        alert('Error: ' + e.message);
    }
}

async function updateExpense() {
    if (!isAdmin) return;
    
    const expense = parseFloat(document.getElementById('expenseInput').value);
    if (isNaN(expense)) {
        alert('Enter valid amount');
        return;
    }
    
    try {
        await fetch(APP_URL, {
            method: 'POST',
            body: JSON.stringify({ type: 'updateExpense', expense: expense })
        });
        alert('✅ Expense updated!');
        loadData();
    } catch(e) {
        alert('Error: ' + e.message);
    }
}

async function updateNote() {
    if (!isAdmin) return;
    
    const note = document.getElementById('noteInput').value;
    
    try {
        await fetch(APP_URL, {
            method: 'POST',
            body: JSON.stringify({ type: 'updateNote', note: note })
        });
        alert('✅ Note updated!');
        loadData();
    } catch(e) {
        alert('Error: ' + e.message);
    }
}
</script>

</body>
</html>
