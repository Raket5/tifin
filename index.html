<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; padding-top: 20px; }
        .tiffin-card { border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header-section { background: linear-gradient(135deg, #198754, #146c43); color: white; padding: 25px; }
        .summary-box { background: #fff; border-left: 5px solid #198754; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .loader-container { display: flex; justify-content: center; align-items: center; min-height: 200px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card tiffin-card">
        <div class="header-section text-center">
            <h2 class="fw-bold mb-1">BN Tiffin Management</h2>
            <h5 id="month-text" class="opacity-75">Loading Month...</h5>
        </div>

        <div class="card-body p-4">
            <div class="row g-3 text-center mb-4">
                <div class="col-6">
                    <div class="summary-box">
                        <small class="text-muted d-block text-uppercase">Total Amount</small>
                        <strong class="fs-4 text-success" id="total-amt">৳ 0</strong>
                    </div>
                </div>
                <div class="col-6">
                    <div class="summary-box" style="border-left-color: #dc3545;">
                        <small class="text-muted d-block text-uppercase">Total Expense</small>
                        <strong class="fs-4 text-danger" id="total-exp">৳ 0</strong>
                    </div>
                </div>
            </div>

            <div id="loader" class="loader-container">
                <div class="spinner-border text-success" role="status"></div>
            </div>

            <div id="main-content" style="display: none;">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Name</th>
                                <th>Taka</th>
                                <th>Meal</th>
                                <th>Hand Cash</th>
                            </tr>
                        </thead>
                        <tbody id="member-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
