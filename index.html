<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BN Tiffin Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            font-family: 'Segoe UI', 'Roboto', 'Poppins', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .modern-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .nav-wrapper {
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%);
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .custom-nav {
            display: flex;
            gap: 5px;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .nav-link-custom {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 18px 24px;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }
        .nav-link-custom.active {
            color: white;
            border-bottom: 3px solid #ffd700;
            background: rgba(255,255,255,0.1);
        }
        .header-gradient {
            background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 100%);
            padding: 35px 30px;
            text-align: center;
        }
        .header-gradient h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .summary-table td {
            padding: 18px 24px;
            border-bottom: 1px solid #f0f0f0;
        }
        .value { font-weight: 700; font-size: 1.4rem; }
        .value.total { color: #2e7d32; }
        .value.expense { color: #d32f2f; }
        .value.month { color: #f57c00; }
        .stats-value { font-size: 1.8rem; font-weight: 800; }
        .custom-table tbody tr:hover { background: #f1f8e9; }
        .badge-taka { background: #e8f5e9; color: #1b5e20; padding: 6px 12px; border-radius: 8px; font-weight: bold; }
        .badge-meal { background: #fff3e0; color: #f57c00; padding: 6px 12px; border-radius: 8px; font-weight: bold; }
        .badge-handcash { background: #e3f2fd; color: #1565c0; padding: 6px 12px; border-radius: 8px; font-weight: bold; }
        .page { display: none; }
        .page.active-page { display: block; }
        .footer-summary {
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%);
            padding: 16px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        @media (max-width: 768px) {
            .nav-wrapper { flex-direction: column; padding: 10px; }
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="modern-card">
        <!-- Navigation -->
        <div class="nav-wrapper">
            <ul class="custom-nav">
                <li><div class="nav-link-custom active" data-page="dashboard"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></div></li>
                <li><div class="nav-link-custom" data-page="members"><i class="fas fa-users"></i><span>Members</span></div></li>
            </ul>
            <button class="btn btn-warning" onclick="openLoginModal()"><i class="fas fa-lock"></i> Admin Login</button>
        </div>

        <!-- Header -->
        <div class="header-gradient">
            <h1><i class="fas fa-utensils me-2"></i>BN Tiffin Management</h1>
        </div>

        <!-- Loader -->
        <div id="loader" class="text-center p-5">
            <div class="spinner-border text-success" role="status"></div>
            <p class="mt-3">Loading data...</p>
        </div>

        <!-- Dashboard Page -->
        <div id="dashboard-page" class="page active-page">
            <div class="p-4">
                <div class="row">
                    <div class="col-md-8">
                        <div class="card mb-4">
                            <div class="card-header bg-success text-white">
                                <h5><i class="fas fa-chart-line"></i> Financial Summary</h5>
                            </div>
                            <table class="table">
                                <tr>
                                    <td><strong>Total Amount</strong></td>
                                    <td class="value total" id="total-amt-display">৳ 0</td>
                                </tr>
                                <tr>
                                    <td><strong>Total Expense</strong></td>
                                    <td class="value expense" id="total-exp-display">৳ 0</td>
                                </tr>
                                <tr>
                                    <td><strong>Month</strong></td>
                                    <td class="value month" id="month-display">January</td>
                                </tr>
                            </table>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="row g-3">
                            <div class="col-12">
                                <div class="card text-center">
                                    <div class="card-body">
                                        <i class="fas fa-utensils fa-2x text-warning"></i>
                                        <h3 id="total-meals" class="mb-0">0</h3>
                                        <small>Total Meals</small>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="card text-center">
                                    <div class="card-body">
                                        <i class="fas fa-users fa-2x text-primary"></i>
                                        <h3 id="total-members" class="mb-0">0</h3>
                                        <small>Members</small>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="card text-center">
                                    <div class="card-body">
                                        <i class="fas fa-chart-pie fa-2x text-info"></i>
                                        <h3 id="avg-amount" class="mb-0">৳ 0</h3>
                                        <small>Avg / Person</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Members Page -->
        <div id="members-page" class="page">
            <div class="p-4">
                <h4><i class="fas fa-users"></i> All Members</h4>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th>
                                <th>Taka</th>
                                <th>Meal</th>
                                <th>Hand Cash</th>
                            </tr>
                        </thead>
                        <tbody id="member-list"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer-summary">
            <div>Total Collection: <strong id="footer-total">৳ 0</strong></div>
            <div>Total Expense: <strong id="footer-expense">৳ 0</strong></div>
            <div>Month: <strong id="footer-month">N/A</strong></div>
        </div>
    </div>
</div>

<!-- Login Modal -->
<div class="modal fade" id="loginModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5>Admin Login</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="text" id="adminUser" class="form-control mb-3" placeholder="Username" value="admin">
                <input type="password" id="adminPass" class="form-control mb-3" placeholder="Password" value="admin123">
                <button onclick="doLogin()" class="btn btn-success w-100">Login</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="script.js"></script>
</body>
</html>
